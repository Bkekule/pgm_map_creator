syntax = "proto3";

package collision_map_creator_msgs.msgs;

import "gz/msgs/vector2d.proto";

message CollisionMapRequest
{
  gz.msgs.Vector2d upper_left  = 1;
  gz.msgs.Vector2d upper_right = 2;
  gz.msgs.Vector2d lower_right = 3;
  gz.msgs.Vector2d lower_left  = 4;
  double height     = 5;
  double resolution = 6;
  string filename   = 7;
  int32  threshold  = 8;
}
