syntax = "proto3";

package collision_map_creator_msgs.msgs;

// Self-contained Vector2d — avoids needing gz-msgs .proto source files at build time.
message Vector2d {
  double x = 1;
  double y = 2;
}

message CollisionMapRequest {
  Vector2d upper_left  = 1;
  Vector2d upper_right = 2;
  Vector2d lower_right = 3;
  Vector2d lower_left  = 4;
  double height        = 5;
  double resolution    = 6;
  string filename      = 7;
  int32  threshold     = 8;
}
